<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TechVolo | Development in Technology</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ---------------- RESET ---------------- */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#000;
    color:#fff;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow-x:hidden;
    position:relative;
}

/* ---------------- ANIMATED BACKGROUND ---------------- */

body::before{
    content:"";
    position:absolute;
    width:800px;
    height:800px;
    background:radial-gradient(circle,rgba(255,255,255,.08),transparent 70%);
    filter:blur(90px);
    animation:bgMove 10s infinite alternate ease-in-out;
}

@keyframes bgMove{

0%{
transform:translate(-300px,-220px);
}

100%{
transform:translate(300px,220px);
}

}

/* ---------------- CONTAINER ---------------- */

.container{

position:relative;
z-index:2;
width:90%;
max-width:1200px;
text-align:center;
padding:40px 20px;

animation:fadeIn 1.5s ease;

}

@keyframes fadeIn{

from{

opacity:0;
transform:translateY(25px);

}

to{

opacity:1;
transform:translateY(0);

}

}

/* ---------------- LOGO ---------------- */

.logo{

display:flex;
justify-content:center;
margin-bottom:20px;

}

.logo img{

width:clamp(90px,12vw,170px);
height:auto;

filter:drop-shadow(0 0 20px rgba(255,255,255,.2));

animation:float 5s infinite ease-in-out;

transition:.3s;

}

.logo img:hover{

transform:scale(1.05);

}

@keyframes float{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-10px);
}

}

/* ---------------- TITLE ---------------- */

h1{

font-size:clamp(40px,6vw,70px);

letter-spacing:6px;

font-weight:700;

}

h1 span{

color:#bfbfbf;

}

.subtitle{

margin-top:10px;

font-size:clamp(17px,2vw,24px);

letter-spacing:3px;

color:#d1d1d1;

}

/* ---------------- BUTTON ---------------- */

.hero-buttons{

margin-top:30px;

display:flex;

justify-content:center;

}

.btn-primary{

display:flex;

justify-content:center;

align-items:center;

text-decoration:none;

background:#fff;

color:#000;

padding:16px 42px;

border-radius:50px;

font-size:18px;

font-weight:600;

min-width:270px;

transition:.35s;

box-shadow:0 10px 30px rgba(255,255,255,.15);

}

.btn-primary:hover{

background:#e5e5e5;

transform:translateY(-5px);

box-shadow:0 15px 35px rgba(255,255,255,.25);

}

/* ---------------- DIVIDER ---------------- */

.line{

width:200px;

height:2px;

background:#fff;

margin:35px auto;

}

/* ---------------- SERVICES ---------------- */

.services{

display:flex;

justify-content:center;

flex-wrap:wrap;

gap:20px;

}

.card{

background:#111;

border:1px solid rgba(255,255,255,.15);

padding:18px 28px;

border-radius:15px;

min-width:180px;

transition:.35s;

cursor:pointer;

}

.card:hover{

background:#fff;

color:#000;

transform:translateY(-8px);

box-shadow:0 10px 30px rgba(255,255,255,.15);

}

/* ---------------- COUNTDOWN ---------------- */

.redirect{

margin-top:40px;

color:#999;

font-size:18px;

}

#count{

font-size:42px;

font-weight:bold;

margin:10px 0;

color:#fff;

}

/* ---------------- FOOTER ---------------- */

footer{

position:absolute;

bottom:15px;

left:50%;

transform:translateX(-50%);

color:#666;

font-size:14px;

}

/* ---------------- MOBILE ---------------- */

@media(max-width:768px){

.container{

padding:30px 15px;

}

.hero-buttons{

width:100%;

}

.btn-primary{

width:100%;

max-width:360px;

font-size:17px;

padding:16px 20px;

}

.services{

flex-direction:column;

align-items:center;

}

.card{

width:100%;

max-width:340px;

}

footer{

position:relative;

margin-top:40px;

left:auto;

transform:none;

}

}

</style>

</head>

<body>

<div class="container">

<!-- Logo -->
<div class="logo">
<img src="logo.png" alt="TechVolo Logo">
</div>

<!-- Company Name -->
<h1>TECH<span>VOLO</span></h1>

<!-- Tagline -->
<p class="subtitle">
Development in Technology
</p>

<!-- Main Button -->
<div class="hero-buttons">

<a href="https://yourwebsite.com" class="btn-primary">

🚀 Explore Our Services

</a>

</div>

<div class="line"></div>

<!-- Services -->

<div class="services">

<div class="card">
🌐 Web Development
</div>

<div class="card">
🤖 AI Solutions
</div>

<div class="card">
☁ Cloud Services
</div>

<div class="card">
📱 Mobile Development
</div>

<div class="card">
⚡ Automation
</div>

</div>

<!-- Countdown -->

<div class="redirect">

Redirecting in

<div id="count">10</div>

seconds...

</div>

</div>

<footer>

© 2026 TechVolo • Development in Technology

</footer>

<script>

let time=10;

const count=document.getElementById("count");

const timer=setInterval(()=>{

time--;

count.textContent=time;

if(time<=0){

clearInterval(timer);

// CHANGE THIS URL
window.location.href="https://yourwebsite.com";

}

},1000);

</script>

</body>
</html>
