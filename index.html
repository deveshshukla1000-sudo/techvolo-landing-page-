<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TechVolo | Development in Technology</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#000;
color:#fff;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* Animated Background */

body::before{
content:"";
position:absolute;
width:700px;
height:700px;
background:radial-gradient(circle,rgba(255,255,255,.12),transparent 70%);
filter:blur(70px);
animation:bgMove 12s ease-in-out infinite alternate;
}

@keyframes bgMove{

0%{
transform:translate(-300px,-200px);
}

100%{
transform:translate(250px,180px);
}

}

.container{

position:relative;
z-index:10;
text-align:center;
animation:fade 1.5s ease;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.logo{

width:170px;
margin:auto;
animation:float 5s ease-in-out infinite;

}

.logo img{

width:100%;
filter:drop-shadow(0 0 30px rgba(255,255,255,.15));

}

@keyframes float{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-10px);
}

}

h1{

margin-top:20px;
font-size:58px;
font-weight:700;
letter-spacing:5px;

}

h1 span{

color:#bfbfbf;

}

.subtitle{

margin-top:15px;
font-size:22px;
color:#cfcfcf;
letter-spacing:3px;

}

.line{

width:200px;
height:2px;
background:white;
margin:30px auto;

}

.services{

display:flex;
justify-content:center;
gap:20px;
margin-top:25px;
flex-wrap:wrap;

}

.service{

padding:18px 28px;
border:1px solid rgba(255,255,255,.15);
border-radius:12px;
background:#111;
transition:.4s;
min-width:180px;

}

.service:hover{

background:#fff;
color:#000;
transform:translateY(-8px);

}

.countdown{

margin-top:45px;
font-size:18px;
color:#aaa;

}

#timer{

font-size:42px;
font-weight:700;
margin-top:10px;
color:white;

}

.button{

margin-top:30px;

}

.button a{

text-decoration:none;
color:black;
background:white;
padding:14px 35px;
border-radius:40px;
font-weight:600;
transition:.3s;

}

.button a:hover{

background:#d9d9d9;

}

footer{

position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
font-size:14px;
color:#666;

}

@media(max-width:768px){

body{

overflow:auto;
padding:40px 20px;

}

h1{

font-size:38px;

}

.subtitle{

font-size:18px;

}

.logo{

width:130px;

}

.services{

gap:15px;

}

.service{

width:100%;

}

}

</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="logo.png" alt="TechVolo Logo">
</div>

<h1>TECH<span>VOLO</span></h1>

<p class="subtitle">
Development in Technology
</p>

<div class="line"></div>

<div class="services">

<div class="service">
🌐 Web Development
</div>

<div class="service">
🤖 AI Solutions
</div>

<div class="service">
☁ Cloud Services
</div>

<div class="service">
📱 Mobile Apps
</div>

<div class="service">
⚡ Automation
</div>

</div>

<div class="countdown">

Redirecting in

<div id="timer">10</div>

seconds...

</div>

<div class="button">

<a href="https://yourwebsite.com">
Enter Website
</a>

</div>

</div>

<footer>

© 2026 TechVolo • Development in Technology

</footer>

<script>

let time=10;

let timer=document.getElementById("timer");

let interval=setInterval(function(){

time--;

timer.innerHTML=time;

if(time==0){

clearInterval(interval);

window.location.href="https://yourwebsite.com";

}

},1000);

</script>

</body>

</html>
